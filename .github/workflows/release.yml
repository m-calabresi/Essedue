name: Build and Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # v1.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-[A-Za-z]+.[0-9]+" # v1.0.0-alpha.1

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      ARTIFACT_NAME: ${{ vars.SITE_NAME }}-${{ github.ref_name }}.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Astro site
        run: PUBLIC_SITE="${{ vars.PUBLIC_SITE }}" yarn build

      - name: Create build archive
        run: |
          cd dist
          zip -r ../${{ env.ARTIFACT_NAME }} .

      - name: Determine Prerelease Flag
        id: prerelease
        run: |
          if [[ ${{ github.ref_name }} =~ (alpha|beta|rc|next|canary) ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Get build date
        id: date
        run: echo "date=$(date -u '+%B %d, %Y')" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
            | grep -v '${{ github.ref_name }}' \
            | head -n 1)
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release body
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.tag }}"
          CURRENT_TAG="${{ github.ref_name }}"

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log $CURRENT_TAG --format="- %s" | head -n 50)
          else
            LOG=$(git log $PREV_TAG..$CURRENT_TAG --format="- %s")
          fi

          cat > release_body.md <<EOF
          ### ℹ️ Notes
          - Built from commit: ${{ github.sha }}
          - Build date: ${{ steps.date.outputs.date }}

          ### 📋 Changelog
          $LOG

          ### 📦 Artifacts
          - \`${{ env.ARTIFACT_NAME }}\` - Static Astro site files (ZIP format)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ env.ARTIFACT_NAME }}
          prerelease: ${{ steps.prerelease.outputs.is-prerelease }}
          body_path: release_body.md
